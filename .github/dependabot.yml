# Dependabot will run on day 16 of each month at 03:52 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '52 3 16 * *'
    open-pull-requests-limit: 15

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '52 3 16 * *'
    open-pull-requests-limit: 15
    versioning-strategy: 'increase'
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: 'npm'
     directory: "/src-admin"
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '52 3 16 * *'
    open-pull-requests-limit: 15
    versioning-strategy: 'increase'
